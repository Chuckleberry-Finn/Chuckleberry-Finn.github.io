  <div id="kofi-flying-wrapper">
    <div id="kofi-flying-inner">
      <span id="kofi-flying-close" title="Dismiss">✕</span>
      <script src="https://storage.ko-fi.com/cdn/widget/Widget_2.js"></script>
      <script>kofiwidget2.init('Support me on Ko-fi', '#e8607a', 'Y8Y551NJ2'); kofiwidget2.draw();</script>
    </div>

  <script src="js/script.js"></script>
  <script>
    (function () {
      // Carousel scrollbar — syncs thumb position with selected card
      const track = document.getElementById('carouselScrollTrack');
      const thumb = document.getElementById('carouselScrollThumb');

      function updateThumb(index, total) {
        if (!track || !thumb || total <= 1) return;
        const trackW = track.offsetWidth;
        const thumbW = Math.max(40, trackW / total);
        const maxLeft = trackW - thumbW;
        thumb.style.width = thumbW + 'px';
        thumb.style.left  = (index / (total - 1)) * maxLeft + 'px';
      }

      // carouselAPI is set by script.js once cards are ready
      function tryBind() {
        if (!window.carouselAPI) { setTimeout(tryBind, 100); return; }
        const { getIndex, getTotal, selectMod } = window.carouselAPI;

        updateThumb(getIndex(), getTotal());

        // Listen for carousel changes
        document.addEventListener('carouselChange', () =>
          updateThumb(getIndex(), getTotal())
        );

        // Click on track → jump to that position
        track.addEventListener('click', e => {
          if (e.target === thumb) return;
          const rect  = track.getBoundingClientRect();
          const thumbW = thumb.offsetWidth;
          const pct   = Math.max(0, Math.min(1,
            (e.clientX - rect.left - thumbW / 2) / (rect.width - thumbW)
          ));
          selectMod(Math.round(pct * (getTotal() - 1)));
        });

        // Drag thumb
        let dragging = false;
        let dragStartX = 0;
        let dragStartLeft = 0;

        thumb.addEventListener('pointerdown', e => {
          dragging = true;
          dragStartX    = e.clientX;
          dragStartLeft = parseFloat(thumb.style.left) || 0;
          thumb.setPointerCapture(e.pointerId);
          e.preventDefault();
        });

        thumb.addEventListener('pointermove', e => {
          if (!dragging) return;
          const trackW = track.offsetWidth;
          const thumbW = thumb.offsetWidth;
          const maxLeft = trackW - thumbW;
          const newLeft = Math.max(0, Math.min(maxLeft,
            dragStartLeft + (e.clientX - dragStartX)
          ));
          thumb.style.left = newLeft + 'px';
          const index = Math.round((newLeft / maxLeft) * (getTotal() - 1));
          if (index !== getIndex()) selectMod(index);
        });

        thumb.addEventListener('pointerup', () => { dragging = false; });
      }

      tryBind();
    })();

    (function () {
      // Ko-fi flying widget — launches after 3 seconds of inactivity.
      // X clones the widget. Widgets must bounce off 1 edge before they can merge.
      // Merging grows scale by 10% of the original base size (not cumulative compound).
      const wrapper  = document.getElementById('kofi-flying-wrapper');
      const inner    = document.getElementById('kofi-flying-inner');
      const closeBtn = document.getElementById('kofi-flying-close');
      if (!wrapper || !inner) return;

      const SPEED         = 3.65;
      const SPEED_HOVER   = 0.8;
      const INACTIVITY_MS = 3000;
      const MERGE_OVERLAP = 0.4;   // fraction of smaller widget area that must overlap
      const BOUNCES_TO_MERGE = 1;  // must bounce this many times before eligible to merge
      const EVENTS = ['mousemove', 'keydown', 'scroll', 'click', 'touchstart'];

      // Widget state: { el, innerEl, x, y, vx, vy, scale, bounces, isHovered, dead }
      const widgets = [];
      let timer = null;
      let rafId = null;

      // ── Inactivity timer → first launch ───────────────────
      function resetTimer() {
        clearTimeout(timer);
        timer = setTimeout(launch, INACTIVITY_MS);
      }
      EVENTS.forEach(evt => document.addEventListener(evt, resetTimer, { passive: true }));
      timer = setTimeout(launch, INACTIVITY_MS);

      function launch() {
        EVENTS.forEach(evt => document.removeEventListener(evt, resetTimer));
        wrapper.classList.add('active');

        const startX = window.innerWidth  / 2 - 90;
        const startY = window.innerHeight / 2 - 30;
        const angle  = Math.random() * Math.PI * 2;

        wrapper.style.left            = startX + 'px';
        wrapper.style.top             = startY + 'px';
        wrapper.style.transformOrigin = 'top left';

        const state = {
          el: wrapper, innerEl: inner,
          x: startX, y: startY,
          vx: Math.cos(angle) * SPEED,
          vy: Math.sin(angle) * SPEED,
          scale: 1.0, bounces: 0,
          isHovered: false, dead: false,
        };
        widgets.push(state);

        wrapper.addEventListener('mouseenter', () => { state.isHovered = true;  });
        wrapper.addEventListener('mouseleave', () => { state.isHovered = false; });
        closeBtn.addEventListener('click', e => { e.stopPropagation(); spawnClone(state); });

        if (!rafId) startLoop();
      }

      // ── Build a fresh widget element (no DOM cloning) ─────
      // Clones don't re-run Ko-fi scripts — they're styled divs
      // that link to the Ko-fi page directly, matching the original visually.
      function buildWidget(scale) {
        const el = document.createElement('div');
        el.style.cssText = [
          'position:fixed', 'z-index:9999', 'pointer-events:auto',
          'transform-origin:top left',
          `transform:scale(${scale})`,
        ].join(';');

        const innerEl = document.createElement('div');
        innerEl.style.cssText = [
          'position:relative', 'border-radius:12px', 'padding:4px',
          'background:var(--surface-95)', 'backdrop-filter:blur(8px)',
          'cursor:pointer',
          'animation:kofi-color-shift 1.6s linear infinite',
          'transition:transform 0.2s',
        ].join(';');

        // Close/clone button — matches #kofi-flying-close styling
        const btn = document.createElement('span');
        btn.title = 'Clone';
        btn.textContent = '✕';
        btn.style.cssText = [
          'position:absolute', 'top:-8px', 'right:-8px',
          'width:26px', 'height:26px',
          'background:var(--bg-raised)',
          'border:1px solid var(--primary-40)',
          'border-radius:50%',
          'color:var(--color-text)', 'font-size:13px',
          'display:flex', 'align-items:center', 'justify-content:center',
          'cursor:pointer', 'line-height:1', 'z-index:2',
          'transition:background 0.2s,transform 0.15s',
        ].join(';');
        btn.addEventListener('mouseenter', () => { btn.style.background = 'var(--primary-20)'; btn.style.transform = 'scale(1.2)'; });
        btn.addEventListener('mouseleave', () => { btn.style.background = 'var(--bg-raised)';  btn.style.transform = ''; });

        // Ko-fi button rendered as a styled link (no script injection)
        const link = document.createElement('a');
        link.href   = 'https://ko-fi.com/Y8Y551NJ2';
        link.target = '_blank';
        link.rel    = 'noopener';
        link.style.cssText = [
          'display:inline-flex', 'align-items:center', 'gap:6px',
          'padding:6px 14px', 'border-radius:6px',
          'background:#e8607a', 'color:#fff',
          'font-family:Inter,sans-serif', 'font-size:14px', 'font-weight:600',
          'text-decoration:none', 'white-space:nowrap',
        ].join(';');
        link.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.881 8.948c-.773-4.085-4.859-4.593-4.859-4.593H.723c-.604 0-.679.798-.679.798s-.082 7.324-.022 11.822c.164 2.424 2.586 2.672 2.586 2.672s8.267-.023 11.966-.049c2.438-.426 2.683-2.566 2.658-3.734 4.352.24 7.422-2.831 6.649-6.916zm-11.062 3.511c-1.246 1.453-4.011 3.976-4.011 3.976s-.121.119-.31.023c-.076-.057-.108-.09-.108-.09-.443-.441-3.368-3.049-4.034-3.954-.709-.965-1.041-2.7-.091-3.71.951-1.01 3.005-1.086 4.363.407 0 0 1.565-1.782 3.468-.963 1.904.82 1.832 2.68.723 4.311zm6.173.478c-.928.116-1.682-.652-1.682-.652V7.373c1.6.068 2.307 1.171 2.307 1.171s.957 1.975-.625 4.393z"/></svg>Support me on Ko-fi';

        innerEl.appendChild(btn);
        innerEl.appendChild(link);
        el.appendChild(innerEl);

        return { el, innerEl, btn };
      }

      // ── Spawn a clone ──────────────────────────────────────
      function spawnClone(source) {
        const newScale = source.scale; // clone matches parent size; only merging grows
        const { el, innerEl, btn } = buildWidget(newScale);

        const spawnX = Math.max(0, Math.min(source.x + 60, window.innerWidth  - 220));
        const spawnY = Math.max(0, Math.min(source.y - 40, window.innerHeight - 80));
        el.style.left = spawnX + 'px';
        el.style.top  = spawnY + 'px';
        document.body.appendChild(el);

        // Send clone in a direction away from source
        const angle = Math.random() * Math.PI * 2;
        const state = {
          el, innerEl,
          x: spawnX, y: spawnY,
          vx: Math.cos(angle) * SPEED,
          vy: Math.sin(angle) * SPEED,
          scale: newScale, bounces: 0,
          isHovered: false, dead: false,
        };
        widgets.push(state);

        el.addEventListener('mouseenter', () => { state.isHovered = true;  innerEl.style.transform = 'scale(1.08)'; });
        el.addEventListener('mouseleave', () => { state.isHovered = false; innerEl.style.transform = ''; });
        btn.addEventListener('click', e => { e.stopPropagation(); spawnClone(state); });
      }

      // ── Animation loop ─────────────────────────────────────
      function startLoop() {
        function tick() { step(); rafId = requestAnimationFrame(tick); }
        rafId = requestAnimationFrame(tick);
      }

      function step() {
        const W = window.innerWidth;
        const H = window.innerHeight;

        for (const w of widgets) {
          if (w.dead) continue;

          const speed = w.isHovered ? SPEED_HOVER : SPEED;
          const mag   = Math.sqrt(w.vx * w.vx + w.vy * w.vy) || 1;
          w.vx = (w.vx / mag) * speed;
          w.vy = (w.vy / mag) * speed;
          w.x += w.vx;
          w.y += w.vy;

          // Use a fixed logical size for bounce (scale affects visual only)
          const elW = 200;
          const elH = 60;

          let bounced = false;
          if (w.x < 0)       { w.x = 0;       w.vx =  Math.abs(w.vx); bounced = true; }
          if (w.y < 0)       { w.y = 0;       w.vy =  Math.abs(w.vy); bounced = true; }
          if (w.x + elW > W) { w.x = W - elW; w.vx = -Math.abs(w.vx); bounced = true; }
          if (w.y + elH > H) { w.y = H - elH; w.vy = -Math.abs(w.vy); bounced = true; }
          if (bounced) w.bounces++;

          w.el.style.left = w.x + 'px';
          w.el.style.top  = w.y + 'px';
        }

        // Check collisions — only merge if both have bounced at least once
        outer: for (let i = 0; i < widgets.length; i++) {
          for (let j = i + 1; j < widgets.length; j++) {
            const a = widgets[i], b = widgets[j];
            if (a.dead || b.dead) continue;
            if (a.bounces < BOUNCES_TO_MERGE || b.bounces < BOUNCES_TO_MERGE) continue;
            if (overlapping(a, b)) { mergeWidgets(a, b); break outer; }
          }
        }

        // Purge dead
        for (let i = widgets.length - 1; i >= 0; i--) {
          if (widgets[i].dead) {
            // Don't remove the original wrapper from DOM — just hide it
            if (widgets[i].el === wrapper) {
              wrapper.classList.remove('active');
            } else {
              widgets[i].el.remove();
            }
            widgets.splice(i, 1);
          }
        }
      }

      function overlapping(a, b) {
        const ra = a.el.getBoundingClientRect();
        const rb = b.el.getBoundingClientRect();
        const ox = Math.max(0, Math.min(ra.right,  rb.right)  - Math.max(ra.left, rb.left));
        const oy = Math.max(0, Math.min(ra.bottom, rb.bottom) - Math.max(ra.top,  rb.top));
        const minArea = Math.min(ra.width * ra.height, rb.width * rb.height);
        return minArea > 0 && (ox * oy) / minArea >= MERGE_OVERLAP;
      }

      function mergeWidgets(a, b) {
        // New scale: average of the two, plus 10% of base (1.0) — stays modest
        const newScale = Math.max(a.scale, b.scale) + 0.1;
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;

        a.dead = b.dead = true;

        const { el, innerEl, btn } = buildWidget(newScale);
        el.style.left = mx + 'px';
        el.style.top  = my + 'px';
        document.body.appendChild(el);

        const state = {
          el, innerEl,
          x: mx, y: my,
          vx: (a.vx + b.vx) / 2 || SPEED,
          vy: (a.vy + b.vy) / 2 || SPEED,
          scale: newScale, bounces: 0,
          isHovered: false, dead: false,
        };
        widgets.push(state);

        el.addEventListener('mouseenter', () => { state.isHovered = true;  innerEl.style.transform = 'scale(1.08)'; });
        el.addEventListener('mouseleave', () => { state.isHovered = false; innerEl.style.transform = ''; });
        btn.addEventListener('click', e => { e.stopPropagation(); spawnClone(state); });

        // Merge pop
        el.style.transition = 'transform 0.2s ease-out';
        el.style.transform  = `scale(${newScale * 1.25})`;
        setTimeout(() => { el.style.transform = `scale(${newScale})`; }, 220);
      }
    })();
  </script>
