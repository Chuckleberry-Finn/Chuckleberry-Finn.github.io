name: Update Mods Data

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write  # Required to commit and push changes

# Prevent concurrent runs to avoid conflicts
concurrency:
  group: "update-mods-data"
  cancel-in-progress: false

jobs:
  update-mods:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper rebase
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pillow

      - name: Generate mods.json and banner
        run: |
          python .github/scripts/generateJson.py
          python .github/scripts/generateImage.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate issues cache
        run: python .github/scripts/generateIssuesCache.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add generated files (including queue and cache)
          git add mods.json mod_stack_preview.png github_stats_queue.json issues/cache/issues_cache.json

          # Check if there are changes to commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Fetch latest from remote
          git fetch origin main

          # Count consecutive bot commits at the tip of origin/main
          BOT_COMMITS=$(git log origin/main --format="%ae %s" | \
            awk 'BEGIN{c=0} /^github-actions\[bot\]@.*Update mods data/{c++} !/^github-actions\[bot\]@.*Update mods data/{exit} END{print c}')

          echo "Found $BOT_COMMITS consecutive bot commits to squash"

          if [ "$BOT_COMMITS" -gt "0" ]; then
            # Soft reset back past all bot commits, preserving our new changes on top
            git reset --soft origin/main~$BOT_COMMITS
            git commit -m "Update mods data [skip ci]"
            git push --force-with-lease origin main
          else
            # No prior bot commits — normal commit and rebase push
            git commit -m "Update mods data [skip ci]"
            git rebase origin/main || {
              git checkout --theirs mods.json mod_stack_preview.png github_stats_queue.json issues/cache/issues_cache.json
              git add mods.json mod_stack_preview.png github_stats_queue.json issues/cache/issues_cache.json
              git rebase --continue
            }
            git push origin main
          fi